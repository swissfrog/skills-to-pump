# ──────────────────────────────────────────────────────────────
# LifeNav — GitHub Actions: Build Release APK + AAB
# Trigger: Push to main OR manual dispatch
# ──────────────────────────────────────────────────────────────
name: 🚀 Release Build

on:
 push:
 branches: [main]
 tags: ['v*.*.*']
 workflow_dispatch:
 inputs:
 build_type:
 description: 'Build type'
 required: true
 default: 'both'
 type: choice
 options: [apk, aab, both]

env:
 FLUTTER_VERSION: '3.22.0'
 JAVA_VERSION: '17'

# Cancel in-progress runs on same branch
concurrency:
 group: ${{ github.workflow }}-${{ github.ref }}
 cancel-in-progress: true

jobs:
 # ────────────────────────────────────────────────────────
 # 1. Validate & Test
 # ────────────────────────────────────────────────────────
 validate:
 name: ✅ Analyze & Test
 runs-on: ubuntu-latest
 steps:
 - name: Checkout
 uses: actions/checkout@v4

 - name: Setup Flutter
 uses: subosito/flutter-action@v2
 with:
 flutter-version: ${{ env.FLUTTER_VERSION }}
 channel: stable
 cache: true

 - name: Install dependencies
 run: flutter pub get

 - name: Run code generation
 run: dart run build_runner build --delete-conflicting-outputs

 - name: Analyze
 run: flutter analyze --no-fatal-infos

 - name: Run tests
 run: flutter test --coverage

 # ────────────────────────────────────────────────────────
 # 2. Build APK (sideload / direct install)
 # ────────────────────────────────────────────────────────
 build-apk:
 name: 📦 Build APK
 runs-on: ubuntu-latest
 needs: validate
 if: |
 github.event_name != 'workflow_dispatch' ||
 inputs.build_type == 'apk' ||
 inputs.build_type == 'both'

 steps:
 - name: Checkout
 uses: actions/checkout@v4

 - name: Setup Java ${{ env.JAVA_VERSION }}
 uses: actions/setup-java@v4
 with:
 distribution: temurin
 java-version: ${{ env.JAVA_VERSION }}
 cache: gradle

 - name: Setup Flutter
 uses: subosito/flutter-action@v2
 with:
 flutter-version: ${{ env.FLUTTER_VERSION }}
 channel: stable
 cache: true

 - name: Install dependencies
 run: flutter pub get

 - name: Run code generation
 run: dart run build_runner build --delete-conflicting-outputs

 # ── Keystore (Base64 secret → file) ───────────────
 - name: Decode Keystore
 if: ${{ secrets.KEYSTORE_BASE64 != '' }}
 run: |
 echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
 > android/app/keystore.jks

 # ── Build signed APK ──────────────────────────────
 - name: Build Release APK
 run: |
 flutter build apk \
 --release \
 --split-per-abi \
 --dart-define=ENV=production
 env:
 KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
 KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
 KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

 - name: Rename APK artifacts
 run: |
 VERSION="${{ github.ref_name }}"
 BUILD="${{ github.run_number }}"
 cd build/app/outputs/flutter-apk
 for f in *.apk; do
 mv "$f" "LifeNav-${VERSION}-${BUILD}-${f}"
 done

 - name: Upload APK artifact
 uses: actions/upload-artifact@v4
 with:
 name: LifeNav-APK-${{ github.run_number }}
 path: build/app/outputs/flutter-apk/*.apk
 retention-days: 14

 # ────────────────────────────────────────────────────────
 # 3. Build AAB (Play Store)
 # ────────────────────────────────────────────────────────
 build-aab:
 name: 🏪 Build AAB (Play Store)
 runs-on: ubuntu-latest
 needs: validate
 if: |
 github.event_name != 'workflow_dispatch' ||
 inputs.build_type == 'aab' ||
 inputs.build_type == 'both'

 steps:
 - name: Checkout
 uses: actions/checkout@v4

 - name: Setup Java ${{ env.JAVA_VERSION }}
 uses: actions/setup-java@v4
 with:
 distribution: temurin
 java-version: ${{ env.JAVA_VERSION }}
 cache: gradle

 - name: Setup Flutter
 uses: subosito/flutter-action@v2
 with:
 flutter-version: ${{ env.FLUTTER_VERSION }}
 channel: stable
 cache: true

 - name: Install dependencies
 run: flutter pub get

 - name: Run code generation
 run: dart run build_runner build --delete-conflicting-outputs

 - name: Decode Keystore
 if: ${{ secrets.KEYSTORE_BASE64 != '' }}
 run: |
 echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
 > android/app/keystore.jks

 - name: Build Release AAB
 run: |
 flutter build appbundle \
 --release \
 --dart-define=ENV=production
 env:
 KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
 KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
 KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

 - name: Upload AAB artifact
 uses: actions/upload-artifact@v4
 with:
 name: LifeNav-AAB-${{ github.run_number }}
 path: build/app/outputs/bundle/release/*.aab
 retention-days: 30

 # ────────────────────────────────────────────────────────
 # 4. GitHub Release (tag pushes only)
 # ────────────────────────────────────────────────────────
 github-release:
 name: 🏷️ GitHub Release
 runs-on: ubuntu-latest
 needs: [build-apk, build-aab]
 if: startsWith(github.ref, 'refs/tags/v')
 permissions:
 contents: write

 steps:
 - name: Download APK
 uses: actions/download-artifact@v4
 with:
 name: LifeNav-APK-${{ github.run_number }}
 path: release/apk

 - name: Download AAB
 uses: actions/download-artifact@v4
 with:
 name: LifeNav-AAB-${{ github.run_number }}
 path: release/aab

 - name: Create GitHub Release
 uses: softprops/action-gh-release@v2
 with:
 tag_name: ${{ github.ref_name }}
 name: "LifeNav ${{ github.ref_name }}"
 draft: false
 prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
 generate_release_notes: true
 files: |
 release/apk/*.apk
 release/aab/*.aab
 body: |
 ## 📱 LifeNav ${{ github.ref_name }}

 ### Downloads
 | Datei | Verwendung |
 |---|---|
 | `*-arm64-v8a.apk` | Moderne Android Geräte (empfohlen) |
 | `*-armeabi-v7a.apk` | Ältere Android Geräte |
 | `*.aab` | Google Play Store Upload |

 ### Neue Features
 - Modernes Dark UI (Material 3)
 - OCR Dokumentenscanner
 - Life Events Management

 > Built with Flutter ${{ env.FLUTTER_VERSION }} · Run #${{ github.run_number }}
