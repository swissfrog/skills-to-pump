name: life_nav
description: "LifeNav — Your Personal Life Management Tool"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ──────────────────────────────────────────
  go_router: ^14.2.0

  # ── State Management ────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── UI / Fonts / Animations ─────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # ── OCR & Camera ────────────────────────────────────────
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # ── Storage & Permissions ───────────────────────────────
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1
  permission_handler: ^11.3.1

  # ── Data / Utils ────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  # assets:
  # - assets/images/
  # - assets/icons/